name: Build and Release Opera Proxy (LuCI AIO Colorful)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream ref to build: latest, tag, branch or commit SHA'
        required: true
        default: 'latest'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PKG_NAME: luci-app-opera-proxy
      BIN_NAME: opera-proxy
      SERVICE_NAME: opera-proxy
      OUT_BIN: opera-proxy-aarch64-musl
      UPSTREAM_REPO: Alexey71/opera-proxy

    steps:
      - name: Checkout local repository
        uses: actions/checkout@v4

      - name: Resolve build metadata
        shell: bash
        run: |
          set -euxo pipefail

          REPO_URL="https://github.com/${UPSTREAM_REPO}.git"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REQUESTED_REF="${{ github.event.inputs.version }}"
          else
            REQUESTED_REF="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${REQUESTED_REF}" || "${REQUESTED_REF}" == "latest" ]]; then
            REQUESTED_REF="$(git ls-remote --refs --tags "${REPO_URL}" \
              | awk -F/ '{print $3}' \
              | grep -E '^v?[0-9]' \
              | sort -V \
              | tail -n 1)"
          fi

          if [[ -z "${REQUESTED_REF}" ]]; then
            echo "Unable to determine upstream ref"
            exit 1
          fi

          VERSION="${REQUESTED_REF#v}"

          if [[ "${REQUESTED_REF}" =~ ^v?[0-9]+(\.[0-9]+)*([.-].*)?$ ]]; then
            RELEASE_TAG="${REQUESTED_REF}"
            RELEASE_NAME="Opera Proxy ${REQUESTED_REF}"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
            RELEASE_TAG="opera-proxy-${VERSION}-${GITHUB_RUN_NUMBER}"
            RELEASE_NAME="Opera Proxy ${VERSION}"
          fi

          {
            echo "REQUESTED_REF=${REQUESTED_REF}"
            echo "VERSION=${VERSION}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "RELEASE_NAME=${RELEASE_NAME}"
          } >> "${GITHUB_ENV}"

      - name: Clone upstream repository
        shell: bash
        run: |
          set -euxo pipefail

          REPO_URL="https://github.com/${UPSTREAM_REPO}.git"
          REF="${REQUESTED_REF}"

          rm -rf upstream_src
          git clone --depth 1 "${REPO_URL}" upstream_src
          cd upstream_src

          if git ls-remote --exit-code --tags origin "refs/tags/${REF}" >/dev/null 2>&1; then
            git fetch --depth 1 origin "refs/tags/${REF}:refs/tags/${REF}"
            git checkout -q "tags/${REF}"
          elif git ls-remote --exit-code --heads origin "${REF}" >/dev/null 2>&1; then
            git fetch --depth 1 origin "${REF}"
            git checkout -q FETCH_HEAD
          else
            git fetch --depth 1 origin "${REF}" || true
            git checkout -q "${REF}"
          fi

          git rev-parse --short HEAD

      - name: Setup Go from upstream go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: upstream_src/go.mod
          cache-dependency-path: upstream_src/go.sum

      - name: Install system dependencies
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y jq dos2unix upx-ucl file binutils curl tar xz-utils

          NFPM_VER="2.43.1"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

      - name: Build minimal arm64 binary
        shell: bash
        run: |
          set -euxo pipefail

          cd upstream_src

          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=arm64

          go mod download

          go build \
            -trimpath \
            -buildvcs=false \
            -tags 'netgo osusergo' \
            -ldflags='-s -w -buildid=' \
            -o "../${OUT_BIN}" \
            .

          cd ..

          strip --strip-unneeded "${OUT_BIN}" || true
          upx --best --lzma "${OUT_BIN}" || true

          file "${OUT_BIN}"
          ls -lh "${OUT_BIN}"

      - name: Generate package files
        shell: bash
        run: |
          set -euxo pipefail

          PKGROOT="${GITHUB_WORKSPACE}/pkgroot"

          mkdir -p \
            "${PKGROOT}/etc/config" \
            "${PKGROOT}/etc/init.d" \
            "${PKGROOT}/usr/share/luci/menu.d" \
            "${PKGROOT}/usr/share/rpcd/acl.d" \
            "${PKGROOT}/www/luci-static/resources/view/opera-proxy"

          cat > "${PKGROOT}/etc/config/opera-proxy" <<'EOF'
          config service 'main'
              option enabled '1'
              option country 'EU'
              option bind_address '127.0.0.1:18080'
              option socks_mode '1'
              option verbosity '20'
              option timeout '10s'
              option init_retries '0'
              option init_retry_interval '5s'
              option refresh '4h'
              option refresh_retry '5s'
              option server_selection 'fastest'
              option server_selection_timeout '30s'
              option proxy ''
              option api_proxy ''
              option cafile ''
              option fake_sni ''
              option override_proxy_address ''
          EOF

          cat > "${PKGROOT}/etc/init.d/opera-proxy" <<'EOF'
          #!/bin/sh /etc/rc.common

          START=95
          STOP=15
          USE_PROCD=1

          SERVICE_NAME="opera-proxy"
          PROG="/usr/bin/opera-proxy"
          CFG="opera-proxy"

          service_triggers() {
              procd_add_reload_trigger "$CFG"
          }

          start_service() {
              local enabled socks_mode
              local country bind_address verbosity timeout
              local init_retries init_retry_interval refresh refresh_retry
              local server_selection server_selection_timeout
              local proxy api_proxy cafile fake_sni override_proxy_address

              config_load "$CFG"

              config_get_bool enabled main enabled 1
              [ "$enabled" -eq 1 ] || return 0

              config_get country main country 'EU'
              config_get bind_address main bind_address '127.0.0.1:18080'
              config_get_bool socks_mode main socks_mode 1
              config_get verbosity main verbosity '20'
              config_get timeout main timeout '10s'
              config_get init_retries main init_retries '0'
              config_get init_retry_interval main init_retry_interval '5s'
              config_get refresh main refresh '4h'
              config_get refresh_retry main refresh_retry '5s'
              config_get server_selection main server_selection 'fastest'
              config_get server_selection_timeout main server_selection_timeout '30s'
              config_get proxy main proxy ''
              config_get api_proxy main api_proxy ''
              config_get cafile main cafile ''
              config_get fake_sni main fake_sni ''
              config_get override_proxy_address main override_proxy_address ''

              procd_open_instance
              procd_set_param command "$PROG"
              procd_append_param command -country "$country"
              procd_append_param command -bind-address "$bind_address"
              procd_append_param command -verbosity "$verbosity"
              procd_append_param command -timeout "$timeout"
              procd_append_param command -init-retries "$init_retries"
              procd_append_param command -init-retry-interval "$init_retry_interval"
              procd_append_param command -refresh "$refresh"
              procd_append_param command -refresh-retry "$refresh_retry"
              procd_append_param command -server-selection "$server_selection"
              procd_append_param command -server-selection-timeout "$server_selection_timeout"

              [ "$socks_mode" -eq 1 ] && procd_append_param command -socks-mode
              [ -n "$proxy" ] && procd_append_param command -proxy "$proxy"
              [ -n "$api_proxy" ] && procd_append_param command -api-proxy "$api_proxy"
              [ -n "$cafile" ] && procd_append_param command -cafile "$cafile"
              [ -n "$fake_sni" ] && procd_append_param command -fake-SNI "$fake_sni"
              [ -n "$override_proxy_address" ] && procd_append_param command -override-proxy-address "$override_proxy_address"

              procd_set_param respawn 3600 5 5
              procd_set_param stdout 1
              procd_set_param stderr 1
              procd_close_instance
          }

          stop_service() {
              return 0
          }
          EOF

          cat > "${PKGROOT}/usr/share/luci/menu.d/luci-app-opera-proxy.json" <<'EOF'
          {
            "admin/services/opera-proxy": {
              "title": "Opera Proxy",
              "order": 90,
              "action": {
                "type": "view",
                "path": "opera-proxy/config"
              },
              "depends": {
                "acl": [ "luci-app-opera-proxy" ]
              }
            }
          }
          EOF

          cat > "${PKGROOT}/usr/share/rpcd/acl.d/luci-app-opera-proxy.json" <<'EOF'
          {
            "luci-app-opera-proxy": {
              "description": "Grant access to Opera Proxy configuration, runtime status and service control",
              "read": {
                "uci": [ "opera-proxy" ],
                "ubus": {
                  "file": [ "stat", "read", "exec" ]
                },
                "file": {
                  "/bin/pidof": [ "exec" ],
                  "/sbin/logread": [ "exec" ],
                  "/usr/bin/opera-proxy": [ "exec" ],
                  "/usr/bin/curl": [ "exec" ],
                  "/proc/*/status": [ "read" ]
                }
              },
              "write": {
                "uci": [ "opera-proxy" ],
                "ubus": {
                  "luci": [ "setInitAction" ]
                }
              }
            }
          }
          EOF

          cat > "${PKGROOT}/www/luci-static/resources/view/opera-proxy/config.js" <<'EOF'
          'use strict';
          'require view';
          'require form';
          'require rpc';
          'require poll';
          'require ui';
          'require uci';
          'require fs';

          var callInitAction = rpc.declare({
              object: 'luci',
              method: 'setInitAction',
              params: [ 'name', 'action' ],
              expect: { result: false }
          });

          function firstPid(text) {
              var m = String(text || '').trim().match(/^(\d+)/);
              return m ? m[1] : null;
          }

          function formatKBToMB(kb) {
              var n = parseInt(kb, 10);
              if (isNaN(n) || n < 0)
                  return '-';
              return (n / 1024).toFixed(1) + ' MB';
          }

          function escapeHtml(s) {
              return String(s == null ? '' : s)
                  .replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;')
                  .replace(/'/g, '&#39;');
          }

          function badge(label, color) {
              return '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-weight:600;color:#fff;background:' + color + '">' +
                  escapeHtml(label) + '</span>';
          }

          return view.extend({
              _countryChoices: null,
              _statusNode: null,
              _actionNode: null,
              _logNode: null,
              _buttons: [],
              _pollRegistered: false,

              load: function() {
                  return Promise.all([
                      uci.load('opera-proxy'),
                      this.loadCountryChoices()
                  ]);
              },

              loadCountryChoices: function() {
                  var fallback = [
                      ['EU', 'EU'],
                      ['AM', 'AM'],
                      ['AS', 'AS']
                  ];

                  return L.resolveDefault(fs.exec_direct('/usr/bin/opera-proxy', ['-list-countries'], 'text'), '')
                      .then(function(output) {
                          var lines = String(output || '').split(/\r?\n/);
                          var choices = [];

                          lines.forEach(function(line) {
                              var s = String(line || '').trim();
                              var m;

                              if (!s)
                                  return;

                              m = s.match(/^([A-Z]{2})\b(?:[\s,:-]+(.+))?$/);
                              if (m)
                                  choices.push([m[1], m[2] ? (m[1] + ' - ' + m[2]) : m[1]]);
                          });

                          return choices.length ? choices : fallback;
                      })
                      .catch(function() {
                          return fallback;
                      });
              },

              readProcValue: function(pid, fieldName) {
                  if (!pid)
                      return Promise.resolve(null);

                  return L.resolveDefault(fs.read_direct('/proc/' + pid + '/status'), '').then(function(txt) {
                      var m = String(txt || '').match(new RegExp('^' + fieldName + ':\\s+([0-9]+)\\s+kB$', 'm'));
                      return m ? m[1] : null;
                  });
              },

              fetchRuntime: function() {
                  var self = this;
                  var mode = (uci.get('opera-proxy', 'main', 'socks_mode') === '1') ? 'SOCKS5' : 'HTTP';
                  var bind = uci.get('opera-proxy', 'main', 'bind_address') || '127.0.0.1:18080';
                  var country = uci.get('opera-proxy', 'main', 'country') || 'EU';

                  return L.resolveDefault(fs.exec_direct('/bin/pidof', ['opera-proxy'], 'text'), '').then(function(pidText) {
                      var pid = firstPid(pidText);

                      return Promise.all([
                          Promise.resolve(pid),
                          self.readProcValue(pid, 'VmRSS'),
                          self.readProcValue(pid, 'VmSize'),
                          Promise.resolve(mode),
                          Promise.resolve(bind),
                          Promise.resolve(country)
                      ]);
                  }).then(function(res) {
                      return {
                          pid: res[0],
                          vmrss: res[1],
                          vmsize: res[2],
                          mode: res[3],
                          bind: res[4],
                          country: res[5]
                      };
                  });
              },

              renderStatusHtml: function(runtime) {
                  var running = !!runtime.pid;
                  var modeColor = runtime.mode === 'SOCKS5' ? '#2563eb' : '#059669';

                  return [
                      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;align-items:stretch">',
                        '<div style="padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff">',
                          '<div style="font-size:12px;color:#6b7280;margin-bottom:6px">Service state</div>',
                          '<div>' + badge(running ? 'Running' : 'Stopped', running ? '#16a34a' : '#dc2626') + '</div>',
                          '<div style="margin-top:8px"><strong>PID:</strong> ' + escapeHtml(runtime.pid || '-') + '</div>',
                          '<div style="margin-top:4px"><strong>RSS:</strong> ' + formatKBToMB(runtime.vmrss) + '</div>',
                        '</div>',
                        '<div style="padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff">',
                          '<div style="font-size:12px;color:#6b7280;margin-bottom:6px">Proxy mode</div>',
                          '<div>' + badge(runtime.mode, modeColor) + '</div>',
                          '<div style="margin-top:8px"><strong>Listen:</strong> ' + escapeHtml(runtime.bind) + '</div>',
                          '<div style="margin-top:4px"><strong>Country:</strong> ' + escapeHtml(runtime.country) + '</div>',
                        '</div>',
                        '<div style="padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff">',
                          '<div style="font-size:12px;color:#6b7280;margin-bottom:6px">Process memory</div>',
                          '<div><strong>VmRSS:</strong> ' + formatKBToMB(runtime.vmrss) + '</div>',
                          '<div style="margin-top:4px"><strong>VmSize:</strong> ' + formatKBToMB(runtime.vmsize) + '</div>',
                        '</div>',
                      '</div>',
                      '<div style="margin-top:8px;color:#6b7280">Status is determined through <code>pidof opera-proxy</code> and <code>/proc/&lt;pid&gt;/status</code>.</div>'
                  ].join('');
              },

              refreshStatus: function() {
                  if (!this._statusNode)
                      return Promise.resolve();

                  return this.fetchRuntime().then(L.bind(function(runtime) {
                      this._statusNode.innerHTML = this.renderStatusHtml(runtime);
                  }, this)).catch(L.bind(function(err) {
                      this._statusNode.innerHTML =
                          '<div style="color:#b91c1c"><strong>Status read failed:</strong> ' +
                          escapeHtml((err && err.message) ? err.message : 'unknown error') +
                          '</div>';
                  }, this));
              },

              refreshLogs: function() {
                  if (!this._logNode)
                      return Promise.resolve();

                  this._logNode.value = 'Refreshing logs...';

                  return L.resolveDefault(fs.exec_direct('/sbin/logread', ['-e', 'opera-proxy'], 'text'), '')
                      .then(L.bind(function(output) {
                          this._logNode.value = String(output || '').trim() || 'No opera-proxy log entries yet.';
                          this._logNode.scrollTop = this._logNode.scrollHeight;
                      }, this))
                      .catch(L.bind(function(err) {
                          this._logNode.value = (err && err.message) ? err.message : 'Unable to read logs.';
                      }, this));
              },

              setActionState: function(busy, text) {
                  if (this._actionNode)
                      this._actionNode.textContent = text || '';

                  this._buttons.forEach(function(btn) {
                      if (btn)
                          btn.disabled = !!busy;
                  });
              },

              handleServiceAction: function(action) {
                  return ui.createHandlerFn(this, function(ev) {
                      if (ev)
                          ev.preventDefault();

                      this.setActionState(true, 'Executing action: ' + action + ' ...');

                      return callInitAction('opera-proxy', action)
                          .then(function() {
                              return new Promise(function(resolve) { window.setTimeout(resolve, 1500); });
                          })
                          .then(L.bind(function() {
                              return Promise.all([
                                  this.refreshStatus(),
                                  this.refreshLogs()
                              ]);
                          }, this))
                          .then(L.bind(function() {
                              this.setActionState(false, 'Last action completed: ' + action);
                          }, this))
                          .catch(L.bind(function(err) {
                              this.setActionState(false, (err && err.message) ? err.message : 'Operation failed');
                              ui.addNotification(null, E('p', {}, (err && err.message) ? err.message : 'Operation failed'));
                          }, this));
                  });
              },

              handleProxyTest: function() {
                  return ui.createHandlerFn(this, function(ev) {
                      var mode = (uci.get('opera-proxy', 'main', 'socks_mode') === '1') ? 'SOCKS5' : 'HTTP';
                      var bind = uci.get('opera-proxy', 'main', 'bind_address') || '127.0.0.1:18080';
                      var args;

                      if (ev)
                          ev.preventDefault();

                      if (mode === 'SOCKS5')
                          args = ['--silent', '--show-error', '--max-time', '15', '--socks5-hostname', bind, 'http://ipv4.icanhazip.com'];
                      else
                          args = ['--silent', '--show-error', '--max-time', '15', '--proxy', 'http://' + bind, 'http://ipv4.icanhazip.com'];

                      this.setActionState(true, 'Testing proxy via ' + mode + ' ' + bind + ' ...');

                      return L.resolveDefault(fs.exec_direct('/usr/bin/curl', args, 'text'), '')
                          .then(L.bind(function(output) {
                              var ip = String(output || '').trim();

                              if (!ip)
                                  throw new Error('Empty response from test target');

                              this.setActionState(false, 'Proxy test succeeded. Exit IP: ' + ip);
                              ui.addNotification(null, E('p', {}, 'Proxy test succeeded. Exit IP: ' + ip));
                              return Promise.all([ this.refreshStatus(), this.refreshLogs() ]);
                          }, this))
                          .catch(L.bind(function(err) {
                              var msg = (err && err.message) ? err.message : 'Proxy test failed';
                              this.setActionState(false, msg);
                              ui.addNotification(null, E('p', {}, msg));
                          }, this));
                  });
              },

              render: function() {
                  var m, s, o;
                  var self = this;
                  var choices = Array.isArray(this._countryChoices) ? this._countryChoices : [['EU', 'EU']];

                  m = new form.Map('opera-proxy', 'Opera Proxy',
                      'Opera Proxy for OpenWrt with LuCI control panel, compact runtime status, colored mode badge and built-in upstream proxy test.');

                  s = m.section(form.TypedSection, 'service', 'Live Status');
                  s.anonymous = true;

                  o = s.option(form.DummyValue, '_status', 'Runtime state',
                      'Shows service state, PID from pidof, current proxy mode, listen address and live memory usage from /proc.');
                  o.rawhtml = true;
                  o.cfgvalue = function() {
                      return '<div data-opera-proxy-status="1">Loading status...</div>';
                  };

                  o = s.option(form.DummyValue, '_actions', 'Actions');
                  o.rawhtml = true;
                  o.cfgvalue = function() {
                      return [
                          '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">',
                          '<button type="button" class="btn cbi-button cbi-button-action" data-opera-action="start">Start</button>',
                          '<button type="button" class="btn cbi-button cbi-button-remove" data-opera-action="stop">Stop</button>',
                          '<button type="button" class="btn cbi-button cbi-button-action" data-opera-action="restart">Restart</button>',
                          '<button type="button" class="btn cbi-button cbi-button-action important" data-opera-action="test">Test proxy</button>',
                          '</div>',
                          '<div data-opera-action-state="1" style="margin-top:8px;min-height:1.4em;color:#6b7280">No action executed yet.</div>'
                      ].join('');
                  };

                  s = m.section(form.TypedSection, 'service', 'Configuration');
                  s.anonymous = true;

                  o = s.option(form.Flag, 'enabled', 'Enable service');
                  o.rmempty = false;

                  o = s.option(form.ListValue, 'country', 'Country');
                  choices.forEach(function(item) {
                      o.value(item[0], item[1]);
                  });
                  o.default = 'EU';
                  o.rmempty = false;

                  o = s.option(form.Flag, 'socks_mode', 'SOCKS5 mode');
                  o.default = '1';
                  o.rmempty = false;
                  o.description = 'Enabled = SOCKS5 proxy. Disabled = HTTP proxy.';

                  o = s.option(form.Value, 'bind_address', 'Listen address');
                  o.datatype = 'hostport';
                  o.placeholder = '127.0.0.1:18080';
                  o.rmempty = false;

                  o = s.option(form.Value, 'verbosity', 'Verbosity');
                  o.datatype = 'uinteger';
                  o.default = '20';
                  o.rmempty = false;

                  o = s.option(form.Value, 'timeout', 'Request timeout');
                  o.datatype = 'string';
                  o.placeholder = '10s';
                  o.rmempty = false;

                  o = s.option(form.Value, 'refresh', 'Endpoint refresh interval');
                  o.datatype = 'string';
                  o.placeholder = '4h';
                  o.rmempty = false;

                  o = s.option(form.ListValue, 'server_selection', 'Server selection');
                  o.value('fastest', 'fastest');
                  o.value('random', 'random');
                  o.default = 'fastest';
                  o.rmempty = false;

                  o = s.option(form.Value, 'proxy', 'Upstream proxy');
                  o.datatype = 'string';
                  o.placeholder = 'socks5://127.0.0.1:1080';
                  o.rmempty = true;

                  o = s.option(form.Value, 'api_proxy', 'API proxy');
                  o.datatype = 'string';
                  o.placeholder = 'http://127.0.0.1:8080';
                  o.rmempty = true;

                  o = s.option(form.Value, 'cafile', 'CA file');
                  o.datatype = 'string';
                  o.placeholder = '/etc/ssl/certs/ca-certificates.crt';
                  o.rmempty = true;

                  o = s.option(form.Value, 'fake_sni', 'Fake SNI');
                  o.datatype = 'string';
                  o.rmempty = true;

                  o = s.option(form.Value, 'override_proxy_address', 'Override proxy address');
                  o.datatype = 'string';
                  o.placeholder = '1.2.3.4:443';
                  o.rmempty = true;

                  s = m.section(form.TypedSection, 'service', 'Diagnostics');
                  s.anonymous = true;

                  o = s.option(form.DummyValue, '_diag', 'Live log output',
                      'Runs logread only when refreshed manually or after service actions.');
                  o.rawhtml = true;
                  o.cfgvalue = function() {
                      return [
                          '<details style="margin-top:4px">',
                          '<summary style="cursor:pointer;font-weight:600">Show opera-proxy logs</summary>',
                          '<div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">',
                          '<button type="button" class="btn cbi-button cbi-button-action" data-opera-refresh-logs="1">Refresh logs</button>',
                          '<span style="color:#6b7280">Runs: logread -e opera-proxy</span>',
                          '</div>',
                          '<textarea data-opera-logs="1" readonly="readonly" wrap="off" style="margin-top:10px;width:100%;min-height:220px;font-family:monospace;background:#111827;color:#e5e7eb;border:1px solid #374151;border-radius:8px;padding:10px"></textarea>',
                          '</details>'
                      ].join('');
                  };

                  return m.render().then(function(nodes) {
                      var btnStart = nodes.querySelector('[data-opera-action="start"]');
                      var btnStop = nodes.querySelector('[data-opera-action="stop"]');
                      var btnRestart = nodes.querySelector('[data-opera-action="restart"]');
                      var btnTest = nodes.querySelector('[data-opera-action="test"]');
                      var logBtn = nodes.querySelector('[data-opera-refresh-logs="1"]');

                      self._statusNode = nodes.querySelector('[data-opera-proxy-status="1"]');
                      self._actionNode = nodes.querySelector('[data-opera-action-state="1"]');
                      self._logNode = nodes.querySelector('[data-opera-logs="1"]');
                      self._buttons = [btnStart, btnStop, btnRestart, btnTest];

                      if (btnStart)
                          btnStart.addEventListener('click', self.handleServiceAction('start'));
                      if (btnStop)
                          btnStop.addEventListener('click', self.handleServiceAction('stop'));
                      if (btnRestart)
                          btnRestart.addEventListener('click', self.handleServiceAction('restart'));
                      if (btnTest)
                          btnTest.addEventListener('click', self.handleProxyTest());
                      if (logBtn) {
                          logBtn.addEventListener('click', function(ev) {
                              ev.preventDefault();
                              self.refreshLogs();
                          });
                      }

                      self.refreshStatus();
                      self.refreshLogs();

                      if (!self._pollRegistered) {
                          poll.add(function() {
                              return self.refreshStatus();
                          }, 8);
                          self._pollRegistered = true;
                      }

                      return nodes;
                  });
              },

              handleSaveApply: function(ev, mode) {
                  var self = this;

                  return this.super('handleSaveApply', [ev, mode]).then(function(res) {
                      return uci.load('opera-proxy').then(function() {
                          return Promise.all([
                              self.refreshStatus(),
                              self.refreshLogs()
                          ]).then(function() {
                              return res;
                          });
                      });
                  });
              }
          });
          EOF

          chmod 0755 "${PKGROOT}/etc/init.d/opera-proxy"
          dos2unix \
            "${PKGROOT}/etc/config/opera-proxy" \
            "${PKGROOT}/etc/init.d/opera-proxy" \
            "${PKGROOT}/usr/share/luci/menu.d/luci-app-opera-proxy.json" \
            "${PKGROOT}/usr/share/rpcd/acl.d/luci-app-opera-proxy.json" \
            "${PKGROOT}/www/luci-static/resources/view/opera-proxy/config.js"

      - name: Create nFPM config and package
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p packaging

          cat > packaging/postinstall.sh <<'EOF'
          #!/bin/sh
          set -e

          [ -n "${IPKG_INSTROOT}" ] && exit 0

          /etc/init.d/opera-proxy enable >/dev/null 2>&1 || true
          /etc/init.d/opera-proxy restart >/dev/null 2>&1 || /etc/init.d/opera-proxy start >/dev/null 2>&1 || true
          /etc/init.d/rpcd reload >/dev/null 2>&1 || true
          rm -f /tmp/luci-indexcache /tmp/luci-modulecache
          exit 0
          EOF

          cat > packaging/preremove.sh <<'EOF'
          #!/bin/sh
          set -e

          [ -n "${IPKG_INSTROOT}" ] && exit 0

          /etc/init.d/opera-proxy stop >/dev/null 2>&1 || true
          /etc/init.d/opera-proxy disable >/dev/null 2>&1 || true
          rm -f /tmp/luci-indexcache /tmp/luci-modulecache
          exit 0
          EOF

          chmod 0755 packaging/postinstall.sh packaging/preremove.sh

          ARCHS=("aarch64_generic" "aarch64_cortex-a53")
          export PKG_DESC="Opera Proxy package for OpenWrt with LuCI interface, SOCKS5-by-default setup, runtime status, colored mode badge and built-in proxy test."

          export SOURCE_DATE_EPOCH=1704067200
          for ARCH in "${ARCHS[@]}"; do
            cat > nfpm_ipk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${ARCH}
          platform: linux
          version: ${VERSION}
          section: net
          priority: optional
          maintainer: ${GITHUB_REPOSITORY_OWNER}
          description: "${PKG_DESC}"
          homepage: https://github.com/${UPSTREAM_REPO}
          license: MIT

          depends:
            - procd
            - uci
            - luci-base
            - rpcd
            - rpcd-mod-file
            - curl

          contents:
            - src: ./${OUT_BIN}
              dst: /usr/bin/${BIN_NAME}
              file_info:
                mode: 0755
                mtime: 2024-01-01T00:00:00Z

            - src: ./pkgroot/etc/init.d/
              dst: /etc/init.d
              type: tree

            - src: ./pkgroot/usr/share/luci/menu.d/
              dst: /usr/share/luci/menu.d
              type: tree

            - src: ./pkgroot/usr/share/rpcd/acl.d/
              dst: /usr/share/rpcd/acl.d
              type: tree

            - src: ./pkgroot/www/luci-static/resources/view/opera-proxy/
              dst: /www/luci-static/resources/view/opera-proxy
              type: tree

            - src: ./pkgroot/etc/config/opera-proxy
              dst: /etc/config/opera-proxy
              type: config|noreplace
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z

          scripts:
            postinstall: ./packaging/postinstall.sh
            preremove: ./packaging/preremove.sh
          EOF

            nfpm package --config nfpm_ipk.yaml --packager ipk --target "${PKG_NAME}_${VERSION}_${ARCH}.ipk"
          done

          unset SOURCE_DATE_EPOCH
          for ARCH in "${ARCHS[@]}"; do
            cat > nfpm_apk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${ARCH}
          platform: linux
          version: ${VERSION}
          section: net
          priority: optional
          maintainer: ${GITHUB_REPOSITORY_OWNER}
          description: "${PKG_DESC}"
          homepage: https://github.com/${UPSTREAM_REPO}
          license: MIT

          depends:
            - procd
            - uci
            - luci-base
            - rpcd
            - rpcd-mod-file
            - curl

          contents:
            - src: ./${OUT_BIN}
              dst: /usr/bin/${BIN_NAME}
              file_info:
                mode: 0755

            - src: ./pkgroot/etc/init.d/
              dst: /etc/init.d
              type: tree

            - src: ./pkgroot/usr/share/luci/menu.d/
              dst: /usr/share/luci/menu.d
              type: tree

            - src: ./pkgroot/usr/share/rpcd/acl.d/
              dst: /usr/share/rpcd/acl.d
              type: tree

            - src: ./pkgroot/www/luci-static/resources/view/opera-proxy/
              dst: /www/luci-static/resources/view/opera-proxy
              type: tree

            - src: ./pkgroot/etc/config/opera-proxy
              dst: /etc/config/opera-proxy
              type: config|noreplace
              file_info:
                mode: 0644

          scripts:
            postinstall: ./packaging/postinstall.sh
            preremove: ./packaging/preremove.sh
          EOF

            nfpm package --config nfpm_apk.yaml --packager apk --target "${PKG_NAME}_${VERSION}_${ARCH}.apk"
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euxo pipefail
          sha256sum "${OUT_BIN}" *.ipk *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-packages-${{ env.VERSION }}
          path: |
            *.ipk
            *.apk
            ${{
              env.OUT_BIN
            }}
            SHA256SUMS.txt

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: |
            *.ipk
            *.apk
            opera-proxy-aarch64-musl
            SHA256SUMS.txt
          draft: false
          prerelease: false
